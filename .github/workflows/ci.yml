name: Backend CI

on:
  push:
    branches: [main, feature/supabase-auth] # Agregué tu rama actual para que lo pruebes ya
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Definimos variables de entorno ficticias para que Django no falle al cargar
    env:
      SUPABASE_URL: "https://fake.supabase.co"
      SUPABASE_ANON_KEY: "fake-key"
      DB_NAME: "postgres"
      DB_USER: "postgres"
      DB_PASSWORD: "password"
      DB_HOST: "localhost"
      DB_PORT: "5432"

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt

      - name: Ejecutar tests
        run: |
          # Usamos manage.py test porque ya configuramos el SQLite en memoria
          python manage.py test